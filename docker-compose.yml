version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: boxmeout
      POSTGRES_PASSWORD: boxmeout
      POSTGRES_DB: boxmeout
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U boxmeout']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: ./backend/.env
    ports:
      - '3001:3001'

  backend-1:
    profiles: [cluster]
    build: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: ./backend/.env
    ports:
      - '3001:3001'

  backend-2:
    profiles: [cluster]
    build: ./backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: ./backend/.env
    ports:
      - '3002:3001'

  nginx-ws:
    profiles: [cluster]
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - backend-1
      - backend-2
    ports:
      - '8080:80'
    volumes:
      - ./nginx/ws-cluster.conf:/etc/nginx/conf.d/default.conf:ro

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    env_file: ./frontend/.env
    ports:
      - '3000:3000'

  postgres-test:
    image: postgres:15-alpine
    profiles: [test]
    environment:
      POSTGRES_USER: boxmeout
      POSTGRES_PASSWORD: boxmeout
      POSTGRES_DB: boxmeout_test
    ports:
      - '5433:5432'
    tmpfs:
      - /var/lib/postgresql/data

volumes:
  postgres_data:
